services:
  - type: web
    name: career-mentor-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://career-mentor-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
